version: '3.9'

services:
  bingo_app:
    container_name: bingo_app
    image: bingo-app:1.0.0
    build: .
    ports:
      - 9090:8080
    environment:
      DATA_SOURCE_URL: jdbc:postgresql://bingo_db:5432/${POSTGRES_DB}
      DATA_SOURCE_USERNAME: ${POSTGRES_USER}
      DATA_SOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - bingo_db
  bingo_db:
    container_name: bingo_db
    image: postgres:16.3
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
